            - paragraph [ref=e269]:
              - generic [ref=e270]: The White Teak Ambience strives to showcase the Indian subcontinent at its peak for specialty coffee, craft bakes and innovative design. We bring together communities across the various walks of life, through specially curated events and experiences.
