            - paragraph [ref=e236]:
              - generic [ref=e237]: Along with being our founding-planter, we have chosen to work in direct trade relationships at origin with coffee estates and smallholder farmers harvesting and processing coffees that we aim to curate into only SCA 85+ point scoring coffees.
            - paragraph [ref=e238]
            - paragraph [ref=e239]:
              - generic [ref=e240]: We pride with our intentional introduction of White Teak “Cascara” (coffee cherry tea) which is the dried skin of coffee cherries which you can brew as you would any other specialty tea.
