        - paragraph [ref=e435]:
          - text: We have set ourselves the task to create one place where you can find matching colors, generate nice color palettes and learn more about color conversions and meaning. Sometimes it is hard to find inspiration for a good color scheme or you do not have the time to experiment until you find matching colors. To facilitate this process, we investigated this set of tools and want to share it with you.
          - text: Feel free to use the color palettes or gradients in your project. If you want, you can recommend our site or refer it to your friends and workmates. We are always happy to hear from you.
          - text: Our collection of tools has just been released and is currently in beta. At the moment, you can generate color palettes or
          - link "create nice CSS gradients" [ref=e436] [cursor=pointer]:
